name: Publish to crates.io

on:
  push:
    tags:
      - 'crate-v*'
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: false
        description: 'Tick to actually publish. Unticked = dry run (preflight + verify build, no publish).'

permissions:
  # `contents: write` permits the `gh release create` step.
  # `id-token: write` lets the `rust-lang/crates-io-auth-action` step exchange
  # a GitHub OIDC token for a short-lived crates.io publish token.
  contents: write
  id-token: write

jobs:
  preflight:
    name: Preflight (version match)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then
            echo "::notice::DRY RUN MODE (workflow_dispatch with publish=false). No publish will occur."
          else
            echo "Publishing run. Trigger: ${{ github.event_name }}. Tag: ${{ github.ref_name }}"
          fi

      - name: Assert tag version matches Cargo.toml
        if: github.event_name == 'push'
        shell: bash
        run: |
          # Tag form: refs/tags/crate-v0.1.0 -> TAG_VERSION=0.1.0
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#crate-v}"
          echo "Tag version: ${TAG_VERSION}"

          # Single-crate Cargo.toml: the `[package]` block carries a literal
          # `version = "..."` line at column 0, so the first unindented match is
          # the crate version. (decibri's workspace Cargo.toml relies on the same
          # first-match rule, but there the literal lives in `[workspace.package]`
          # while member crates use `version.workspace = true`.)
          CARGO_VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' Cargo.toml | head -1)
          if [ -z "$CARGO_VERSION" ]; then
            echo "ERROR: could not extract version from Cargo.toml"
            exit 1
          fi
          echo "Cargo.toml version: ${CARGO_VERSION}"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: tag crate-v${TAG_VERSION} does not match Cargo.toml version ${CARGO_VERSION}"
            echo "Bump Cargo.toml to ${TAG_VERSION}, then re-tag."
            exit 1
          fi

          echo "OK: tag and Cargo.toml agree on ${TAG_VERSION}"

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: preflight
    # Required-reviewer protection on this environment gates the publish behind
    # a manual approval in the Actions UI.
    environment: crates
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # No system libraries are installed here. decibri's publish job installs
      # ALSA headers because its `cpal` transitive dep needs them during the
      # `cargo publish` verify build; this crate's only dependency is thiserror,
      # so the verify build links nothing platform-specific.

      - name: Dry-run package and verify build (no publish)
        # The dry-run path: a workflow_dispatch with `publish` unticked packages
        # and verify-builds the crate without authenticating or uploading. This
        # is what runs "the build" in the dry run; the steps below are skipped.
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: cargo publish --dry-run

      - name: Authenticate to crates.io
        # Exchanges a GitHub OIDC token for a short-lived crates.io publish
        # token, exposed via `steps.auth.outputs.token` and consumed by the next
        # step's `CARGO_REGISTRY_TOKEN`. Runs on a tag push or a dispatch with
        # `publish` ticked; skipped on the dry-run path.
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        # Single crate, so no `-p` flag. Tag-push always publishes; a dispatch
        # publishes only when `publish` is ticked.
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes
